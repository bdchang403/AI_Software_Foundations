# Example GitHub Agent Configuration (.github/agents/context-factory-bot.yaml)

name: ContextFactoryBot
description: An autonomous agent that validates PRs against context-enriched stories.

# The "Soul" (Instructions)
instructions: |
  You are a Compliance & Risk Auditor Agent. 
  Your goal is to ensure every PR matches its corresponding context-enriched story.
  Load the Master Router from `templates_and_resources/master_router.md`.
  If a PR lack an AI-Generated-By trailer, flag it for review.

# The "Memory" (Context)
context:
  directories:
    - docs/stories/
    - docs/adr/
    - templates_and_resources/

# The "Hands" (Tools)
tools:
  - type: github_action
    name: run_adversarial_tests
  - type: function
    name: check_constitution_compliance

# The Audit Trailer
on_completion:
  append_trailer: "AI-Reviewed-By: ContextFactoryBot (GitHub Agent)"
